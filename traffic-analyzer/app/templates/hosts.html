{% extends 'admin/master.html' %}

{% block body %}
<div class="container-fluid">
    <h5 class="section-title"><i class="bi bi-hdd-network"></i> Подключённые узлы</h5>
    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0" id="hosts-table">
                    <thead>
                        <tr>
                            <th>ID узла</th>
                            <th>Имя хоста</th>
                            <th>ОС / Архитектура</th>
                            <th>Ядро</th>
                            <th>Интерфейсы</th>
                            <th>Время загрузки</th>
                            <th>Зарегистрирован</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block tail_js %}
{{ super() }}
<script>
async function loadHosts() {
    const r = await fetch('/api/hosts/');
    const hosts = await r.json();
    const tb = document.querySelector('#hosts-table tbody');
    tb.innerHTML = '';

    hosts.forEach(h => {
        const ifaces = h.interfaces || {};
        let badges = '';
        Object.keys(ifaces).map(Number).sort((a,b)=>a-b).forEach(idx => {
            badges += `<span class="badge badge-iface me-1">${idx}:${ifaces[idx]}</span>`;
        });
        if (!badges) badges = '<span class="text-muted">—</span>';

        tb.innerHTML += `<tr>
            <td><span class="text-mono" title="${h.host_id}">${(h.host_id||'').substring(0,12)}…</span></td>
            <td>${h.hostname||'—'}</td>
            <td>${h.os||''} / ${h.arch||''}</td>
            <td><small>${h.kernel_version||''}</small></td>
            <td>${badges}</td>
            <td><small>${h.boot_time||'—'}</small></td>
            <td><small>${h.registered_at||'—'}</small></td>
        </tr>`;
    });

    if (!hosts.length) {
        tb.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">Нет зарегистрированных узлов</td></tr>';
    }
}
loadHosts();
setInterval(loadHosts, 60000);
</script>
{% endblock %}
