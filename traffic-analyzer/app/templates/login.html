<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Анализатор трафика</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
</head>
<body>
<div class="login-wrapper">
    <div class="card login-card">
        <div class="card-header text-center py-4" style="background:#f8f9fa;">
            <h4 class="mb-0"><i class="bi bi-shield-check text-success"></i> Анализатор трафика</h4>
            <small class="text-muted">Войдите для продолжения</small>
        </div>
        <div class="card-body p-4">
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% for cat, msg in messages %}
            <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
            {% endfor %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.login', next=request.args.get('next', '')) }}">
                {{ form.hidden_tag() }}
                <div class="mb-3">
                    <label class="form-label fw-semibold">Эл. почта</label>
                    <input type="text" name="email" class="form-control"
                           value="{{ form.email.data or '' }}" placeholder="admin@localhost" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Пароль</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" name="remember" class="form-check-input" id="remember">
                    <label class="form-check-label" for="remember">Запомнить меня</label>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-box-arrow-in-right"></i> Войти
                </button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
