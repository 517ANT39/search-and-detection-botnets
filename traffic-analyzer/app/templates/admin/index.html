{% extends 'admin/master.html' %}
{% block body %}
<div class="container-fluid mt-4">
    <div class="row">
        <div class="col-md-3"><div class="card text-center"><div class="card-body">
            <h5>Users</h5><h2>{{ stats.total_users|default(0) }}</h2>
        </div></div></div>
        <div class="col-md-3"><div class="card text-center"><div class="card-body">
            <h5>Hosts</h5><h2>{{ stats.total_hosts|default(0) }}</h2>
        </div></div></div>
        <div class="col-md-3"><div class="card text-center"><div class="card-body">
            <h5>Alerts</h5><h2>{{ stats.total_alerts|default(0) }}</h2>
        </div></div></div>
        <div class="col-md-3"><div class="card text-center border-danger"><div class="card-body">
            <h5 class="text-danger">Unresolved</h5><h2 class="text-danger">{{ stats.unresolved_alerts|default(0) }}</h2>
        </div></div></div>
    </div>
    <div class="row mt-4"><div class="col-12"><div class="card"><div class="card-body">
        <h5>Quick Actions</h5>
        <form action="{{ url_for('run_analysis.run') }}" method="POST" class="d-inline">
            <button type="submit" class="btn btn-warning">🔍 Run Analysis</button>
        </form>
    </div></div></div></div>
</div>
{% endblock %}
