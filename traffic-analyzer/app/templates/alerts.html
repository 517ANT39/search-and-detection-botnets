{% extends 'admin/master.html' %}

{% block body %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="section-title mb-0"><i class="bi bi-exclamation-triangle"></i> Оповещения</h5>
        <div class="toolbar mb-0">
            <select id="f-sev" class="form-select form-select-sm" style="width:auto;">
                <option value="">Все уровни</option>
                <option value="critical">Критический</option>
                <option value="high">Высокий</option>
                <option value="medium">Средний</option>
                <option value="low">Низкий</option>
            </select>
            <select id="f-type" class="form-select form-select-sm" style="width:auto;">
                <option value="">Все типы</option>
                <option value="anomaly">Аномалия</option>
                <option value="port_scan">Сканирование портов</option>
                <option value="ddos">DDoS</option>
            </select>
            <div class="form-check">
                <input type="checkbox" class="form-check-input" id="f-unres" checked>
                <label class="form-check-label small" for="f-unres">Только открытые</label>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0" id="alerts-table">
                    <thead>
                        <tr>
                            <th>Время</th>
                            <th>Критичность</th>
                            <th>Тип</th>
                            <th>Узел</th>
                            <th>Описание</th>
                            <th>Источник</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block tail_js %}
{{ super() }}
<script>
const SEV_CLS = {critical:'badge-critical', high:'badge-high', medium:'badge-medium', low:'badge-low'};
const SEV_RU = {critical:'Критический', high:'Высокий', medium:'Средний', low:'Низкий'};
const TYPE_RU = {anomaly:'Аномалия', port_scan:'Сканирование', ddos:'DDoS'};

async function loadAlerts(p=1) {
    const params = new URLSearchParams({page:p, per_page:50, unresolved:document.getElementById('f-unres').checked});
    const s = document.getElementById('f-sev').value; if(s) params.set('severity',s);
    const t = document.getElementById('f-type').value; if(t) params.set('type',t);

    const r = await fetch('/api/alerts/?'+params);
    const d = await r.json();
    const tb = document.querySelector('#alerts-table tbody');
    tb.innerHTML = '';

    d.items.forEach(a => {
        const cls = SEV_CLS[a.severity] || 'badge-low';
        const sevText = SEV_RU[a.severity] || a.severity;
        const typeText = TYPE_RU[a.alert_type] || a.alert_type;

        tb.innerHTML += `<tr>
            <td><small>${new Date(a.created_at).toLocaleString('ru-RU')}</small></td>
            <td><span class="badge ${cls}">${sevText}</span></td>
            <td>${typeText}</td>
            <td><span class="text-mono">${(a.host_id||'').substring(0,8)}…</span></td>
            <td>${a.title}</td>
            <td>${a.src_ip||'—'}</td>
            <td>
                ${!a.is_resolved
                    ? `<button class="btn btn-sm btn-outline-success btn-action" onclick="resolveAlert(${a.id})">
                         <i class="bi bi-check-lg"></i> Решить
                       </button>`
                    : '<span class="text-success"><i class="bi bi-check-circle-fill"></i> Решено</span>'}
            </td>
        </tr>`;
    });

    if (!d.items.length) {
        tb.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">Оповещений нет</td></tr>';
    }
}

async function resolveAlert(id) {
    await fetch('/api/alerts/'+id+'/resolve', {method:'POST'});
    loadAlerts();
}

document.getElementById('f-sev').onchange = () => loadAlerts();
document.getElementById('f-type').onchange = () => loadAlerts();
document.getElementById('f-unres').onchange = () => loadAlerts();
loadAlerts();
</script>
{% endblock %}
