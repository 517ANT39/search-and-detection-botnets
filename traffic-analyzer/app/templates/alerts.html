{% extends "base.html" %}
{% block title %}Alerts{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h3><i class="bi bi-exclamation-triangle"></i> Alerts</h3>
    <div>
        <select id="f-sev" class="form-select form-select-sm bg-dark text-light border-secondary d-inline-block w-auto">
            <option value="">All</option><option value="critical">Critical</option><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option>
        </select>
        <select id="f-type" class="form-select form-select-sm bg-dark text-light border-secondary d-inline-block w-auto">
            <option value="">All</option><option value="anomaly">Anomaly</option><option value="port_scan">Port Scan</option><option value="ddos">DDoS</option>
        </select>
        <label class="text-muted ms-2"><input type="checkbox" id="f-unres" checked> Unresolved</label>
    </div>
</div>
<div class="table-responsive">
    <table class="table table-dark table-striped table-hover" id="alerts-table">
        <thead><tr><th>Time</th><th>Severity</th><th>Type</th><th>Host</th><th>Title</th><th>Src</th><th>Actions</th></tr></thead>
        <tbody></tbody>
    </table>
</div>
{% endblock %}
{% block scripts %}
<script>
const SEV_CLS={critical:'danger',high:'warning',medium:'info',low:'secondary'};
async function loadAlerts(p=1){
    const params=new URLSearchParams({page:p,per_page:50,unresolved:document.getElementById('f-unres').checked});
    const s=document.getElementById('f-sev').value; if(s)params.set('severity',s);
    const t=document.getElementById('f-type').value; if(t)params.set('type',t);
    const r=await fetch('/api/alerts?'+params); const d=await r.json();
    const tb=document.querySelector('#alerts-table tbody'); tb.innerHTML='';
    d.items.forEach(a=>{
        const c=SEV_CLS[a.severity]||'secondary';
        tb.innerHTML+=`<tr>
            <td>${new Date(a.created_at).toLocaleString()}</td>
            <td><span class="badge bg-${c}">${a.severity}</span></td>
            <td>${a.alert_type}</td>
            <td><code>${a.host_id.substring(0,8)}…</code></td>
            <td>${a.title}</td>
            <td>${a.src_ip||'—'}</td>
            <td>${!a.is_resolved?`<button class="btn btn-sm btn-outline-success" onclick="res(${a.id})">Resolve</button>`:'<span class="text-success">✓</span>'}</td>
        </tr>`;
    });
}
async function res(id){await fetch('/api/alerts/'+id+'/resolve',{method:'POST'});loadAlerts();}
document.getElementById('f-sev').onchange=()=>loadAlerts();
document.getElementById('f-type').onchange=()=>loadAlerts();
document.getElementById('f-unres').onchange=()=>loadAlerts();
loadAlerts();
</script>
{% endblock %}
